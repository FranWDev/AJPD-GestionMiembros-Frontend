@if (svc.isOpen()) {
  <div class="modal-backdrop" [class.modal-backdrop--closing]="svc.isClosing()" (click)="svc.cerrar()" aria-hidden="true"></div>

  <div class="modal-container" role="dialog" aria-modal="true">
    <div class="modal-box" [class.modal-box--closing]="svc.isClosing()">
      <div class="modal-header">
        <h2 class="modal-title">Documentos — {{ svc.nombre() }}</h2>
      </div>

      <div class="placeholder-body">
        <div class="placeholder-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
          </svg>
        </div>
        <p class="placeholder-text">La gestion de documentos estara disponible proximamente.</p>
      </div>

      <div class="modal-actions">
        <button class="btn btn-ghost" type="button" (click)="svc.cerrar()">Cerrar</button>
      </div>
    </div>
  </div>
}
