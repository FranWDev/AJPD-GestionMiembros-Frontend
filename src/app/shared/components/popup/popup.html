@if (modalService.isOpen()) {
  <div class="modal-backdrop" [class.modal-backdrop--closing]="modalService.isClosing()" (click)="close()">
    <div class="modal-card" [class]="modalService.type()" [class.modal-card--closing]="modalService.isClosing()" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <div class="icon-container">
          @switch (modalService.type()) {
            @case ('success') {
              <svg class="modal-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                <polyline points="22 4 12 14.01 9 11.01"/>
              </svg>
            }
            @case ('error') {
              <svg class="modal-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
              </svg>
            }
            @case ('warning') {
              <svg class="modal-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/>
                <line x1="12" y1="9" x2="12" y2="13"/>
                <line x1="12" y1="17" x2="12.01" y2="17"/>
              </svg>
            }
            @default {
              <svg class="modal-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="16" x2="12" y2="12"/>
                <line x1="12" y1="8" x2="12.01" y2="8"/>
              </svg>
            }
          }
        </div>
        <h2 class="modal-title">{{ modalService.title() }}</h2>
      </div>

      <div class="modal-body">
        <p>{{ modalService.message() }}</p>
      </div>

      <div class="modal-footer">
        <button class="btn btn-close" (click)="close()">Aceptar</button>
      </div>
    </div>
  </div>
}
