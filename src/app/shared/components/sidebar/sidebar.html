<nav class="sidebar" [class.collapsed]="layoutService.sidebarCollapsed()">

  <div class="sidebar-brand">
    <img src="logo-1.png" alt="AJPD" class="brand-logo" />
    <span class="brand-name">Proyecto Dubini</span>
  </div>

  <div class="sidebar-nav">
    @for (item of navItems; track item.label) {

    @if (!item.children) {
    <a class="nav-item" [routerLink]="item.route" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }"
      (click)="onNavClick()" [title]="item.label">
      <span class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
          stroke-linejoin="round">
          <path [attr.d]="item.svgPath" />
        </svg>
      </span>
      <span class="nav-label">{{ item.label }}</span>
    </a>

    } @else {
    <div class="nav-group">
      <button class="nav-item nav-group-toggle" [class.open]="openGroup() === item.label"
        (click)="toggleGroup(item.label)" [title]="item.label" type="button">
        <span class="nav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
            stroke-linejoin="round">
            <path [attr.d]="item.svgPath" />
          </svg>
        </span>
        <span class="nav-label">{{ item.label }}</span>
        <span class="nav-chevron">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M9 18l6-6-6-6" />
          </svg>
        </span>
      </button>

      <div class="nav-children" [class.open]="openGroup() === item.label">
        @for (child of item.children; track child.label) {
        <a class="nav-item nav-child" [routerLink]="child.route" routerLinkActive="active" (click)="onNavClick()"
          [title]="child.label">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
              stroke-linejoin="round">
              <path [attr.d]="child.svgPath" />
            </svg>
          </span>
          <span class="nav-label">{{ child.label }}</span>
        </a>
        }
      </div>
    </div>
    }

    }
  </div>

  <div class="sidebar-footer">
    <button class="nav-item collapse-btn" (click)="toggleSidebar($event)" title="Colapsar panel" type="button">
      <span class="nav-icon">
        @if (layoutService.sidebarCollapsed()) {
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M11.25 4.5l7.5 7.5-7.5 7.5m-6-15l7.5 7.5-7.5 7.5" />
        </svg>
        } @else {
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
          stroke-linejoin="round">
          <path d="M18.75 19.5l-7.5-7.5 7.5-7.5m-6 15L5.25 12l7.5-7.5" />
        </svg>
        }
      </span>
    </button>
  </div>

</nav>
